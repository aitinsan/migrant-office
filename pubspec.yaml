name: migrant_office
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  go_router: 17.1.0

  core:
    path: ./modules/core

  design_system:
    path: ./modules/design_system

  network:
    path: ./modules/network

  auth:
    path: ./modules/auth

  applications:
    path: ./modules/applications

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0

flutter:
  uses-material-design: true

workspace:
  - modules/core
  - modules/design_system
  - modules/network
  - modules/auth
  - modules/applications
